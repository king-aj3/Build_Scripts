# build_projects.toml — default project list for build_projects.py
# ====================================================================
# When you run `python build_projects.py` with NO project arguments, it
# builds exactly this list. To add a future project to the build set, add
# ONE line below — a path relative to THIS file, or an absolute path.
#
#   python build_projects.py                 # builds every project listed here
#   python build_projects.py --dry-run       # preview the schedule for this list
#   python build_projects.py ../OtherProj    # ignore this list, build only args
#   python build_projects.py --all --root .. # ignore this list, auto-discover instead
#
# A project qualifies only if it has its own build_hosts.toml (run
# `build_all.py <project> --init` once to generate one).

projects = [
    "../ajj3-brain",
    "../WealthBuilder",
    "../Thrift_Reseller",
]

# ── Windows build VM (libvirt) auto start/stop ──────────────────────────────
# When a windows job is scheduled, build_projects.py starts this VM if it's shut
# off (waiting for SSH), runs the windows build(s), then shuts it down AFTER all
# binaries are built + copied back -- but ONLY if it started the VM (a VM that
# was already running is left running). Graceful shutdown only; never forced. On
# a windows-build failure the VM is left UP for debugging. virsh runs without
# sudo (libvirt group). Skip for one run with --no-manage-vm.
[windows_vm]
manage           = true
domain           = "win10_pro_x64_python"      # libvirt domain (virsh list --all)
ssh              = "ajenkins@192.168.122.195"  # probe target for "VM is up"
connect          = "qemu:///system"            # libvirt URI
boot_timeout     = 180                          # seconds to wait for SSH after start
shutdown_timeout = 120                          # seconds to wait for graceful poweroff
# OPTIONAL VM right-sizing -- DEFAULT OFF. When true, the VM is resized on
# cold-boot to K*cores_per_build vCPU (2-socket topology) / K*mem_per_build_gb RAM
# and each build is capped to --jobs cores_per_build. OFF by default because
# benchmarking on THIS host (3990X) showed growing vCPU is COUNTERPRODUCTIVE:
# a 32-vCPU guest built ~27% slower than 16 (L3/CCD locality), socket layout was
# irrelevant, and a jobs=8 cap matched jobs=16. 16 vCPU is the sweet spot -- a
# fixed VM + lane parallelism (--windows-jobs) is fastest (lane-2 ~25m). Flip to
# true only on hardware where more vCPU actually helps. (Auto start/stop above is
# unaffected by this.)
size_to_jobs     = false
cores_per_build  = 16                            # only if size_to_jobs=true: vCPU + --jobs per build
mem_per_build_gb = 16                            # only if size_to_jobs=true: RAM (GB) per build
